global:
  fullnameOverride: l2-sequencer-__INDEX__

resources:
  requests:
    memory: "512Mi"
    cpu: "100m"
  limits:
    memory: "2Gi"
    cpu: "1000m"

envFrom:
  - configMapRef:
      name: l2-sequencer-__INDEX__-env
  - secretRef:
      name: l2-sequencer-secret-0-env

initContainers:
  wait-for-l1:
    image: scrolltech/scroll-alpine:v0.0.1
    command:
      - /bin/sh
      - -c
      - /wait-for-l1.sh $L2GETH_L1_ENDPOINT
    envFrom:
      - configMapRef:
          name: l2-sequencer-__INDEX__-env
    volumeMounts:
      - name: wait-for-l1-script
        mountPath: /wait-for-l1.sh
        subPath: wait-for-l1.sh

configMaps:
  env:
    enabled: true
    data:
      CHAIN_ID: ""
      L2GETH_L1_ENDPOINT: ""
      L2GETH_L1_CONTRACT_DEPLOYMENT_BLOCK: ""
      L2GETH_SIGNER_ADDRESS: ""
      L2GETH_PEER_LIST: '[""]'
      L2GETH_CCC_NUMWORKERS: ""

persistence:
  env:
    enabled: true
    type: configMap
    name: l2-sequencer-__INDEX__-env

externalSecrets:
  l2-sequencer-secret-env:
    provider: aws
    data:
      - remoteRef:
          key: scroll/l2-sequencer-secret-env
          property: L2GETH_KEYSTORE___INDEX__
        secretKey: L2GETH_KEYSTORE
      - remoteRef:
          key: scroll/l2-sequencer-secret-env
          property: L2GETH_PASSWORD___INDEX__
        secretKey: L2GETH_PASSWORD
      - remoteRef:
          key: scroll/l2-sequencer-secret-env
          property: L2GETH_NODEKEY___INDEX__
        secretKey: L2GETH_NODEKEY
    refreshInterval: 2m
    serviceAccount: external-secrets
