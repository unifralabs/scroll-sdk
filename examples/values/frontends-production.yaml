resources:
  requests:
    cpu: 50m
    memory: 100Mi
  limits:
    cpu: 200m
    memory: 256Mi

persistence:
  frontends:
    enabled: true
    type: configMap
    mountPath: /app/conf/
    name: frontends-config

ingress:
  main:
    ingressClassName: "nginx"
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
